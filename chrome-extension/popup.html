<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { --bg: #1a1a2e; --card: #16213e; --accent: #4169E1; --text: #e0e0e0; --muted: #888; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; padding: 16px;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    h1 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .connected { background: #22c55e; }
    .disconnected { background: #ef4444; }
    .connecting { background: #f59e0b; }

    .section { margin-bottom: 12px; }
    .section-title { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

    .platform-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .platform-chip {
      padding: 4px 10px; border-radius: 12px; font-size: 12px;
      background: var(--card); border: 1px solid #2a2a4a;
    }
    .platform-chip.active { border-color: var(--accent); background: #1a2a4e; }
    .platform-chip.inactive { opacity: 0.5; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; border: none;
      font-size: 12px; cursor: pointer;
      background: var(--accent); color: white;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: var(--card); }

    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .label { color: var(--muted); }
    .value { font-weight: 500; }

    .footer { margin-top: 12px; padding-top: 8px; border-top: 1px solid #2a2a4a; font-size: 11px; color: var(--muted); }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <h1>
    <span class="status-dot" id="statusDot"></span>
    Web AI Bridge
  </h1>

  <div class="section">
    <div class="section-title">Bridge Server</div>
    <div class="row"><span class="label">连接</span><span class="value" id="bridgeStatus">检查中...</span></div>
    <div class="row"><span class="label">地址</span><span class="value">ws://localhost:9876</span></div>
  </div>

  <div class="section">
    <div class="section-title">已连 AI 平台</div>
    <div class="platform-grid" id="platformList">
      <span style="color: var(--muted)">正在检测...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">可用标签页</div>
    <div id="tabList" style="font-size: 12px; color: var(--muted)">正在检测...</div>
  </div>

  <div style="display: flex; gap: 8px;">
    <button class="btn" id="btnReconnect">🔄 重连</button>
    <button class="btn btn-outline" id="btnRefresh">↻ 刷新状态</button>
  </div>

  <div class="footer">
    提示：保持 AI 平台标签页打开即可桥接
  </div>

  <script src="popup.js"></script>
</body>
</html>
